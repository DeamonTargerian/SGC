<!DOCTYPE html>
<html>
<head>
    <title>Comment Form</title>
</head>
<body>

    <h2>Leave a Comment</h2>

    <form action="#" method="post">

        <textarea id="comment" name="comment" rows="5" cols="30"></textarea>
        
        <br><br>
        
        <input type="submit" value="Submit Comment">
    
    </form>

</body>
</html>
